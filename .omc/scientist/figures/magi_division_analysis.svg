<text x="50" y="735" class="section-title" fill="#27ae60">RECOMMENDATION: Division C (Attitude) — Conservative / Antifragile / Skeptical</text>
<text x="50" y="760" class="label" font-weight="bold">WHY this division maximizes GENUINE tension:</text>
<text x="50" y="775" class="label" >1. All three agents are authentically Talebian — none is a straw man or foil.</text>
<text x="50" y="790" class="label" >2. They represent three REAL prescriptive impulses that conflict WITHIN Taleb's own work:</text>
<text x="50" y="805" class="label" >   - Via Negativa says 'remove exposure' vs Antifragile says 'seek volatile exposure'</text>
<text x="50" y="820" class="label" >   - Skeptic says 'we can't know' vs Antifragile says 'act anyway, be convex'</text>
<text x="50" y="835" class="label" >   - Conservative says 'do nothing' vs Skeptic asks 'but is inaction iatrogenic?'</text>
<text x="50" y="850" class="label" >3. Coverage: 86% primary (12/14 frameworks), 100% with secondary assignments.</text>
<text x="50" y="865" class="label" >4. Disagreement rate: 75% of questions produce directional disagreement.</text>
<text x="50" y="880" class="label" >5. The tension is UNPREDICTABLE — unlike Temporal (Past always says no) or Character (Academic always loses).</text>

# 自定义模型与 provider 路由
# 当 IntentGate 判定为 "fat-tail" 类问题时,
# 通过 mode-marker 扩展把 thinkingLevel 切到 high,
# 让 default 模型走深度推理通道。

# 如需添加自定义 provider（OpenRouter / 本地 vLLM 等）,
# 在这里声明。例如：
#
# providers:
#   openrouter:
#     baseURL: https://openrouter.ai/api/v1
#     apiKeyEnv: OPENROUTER_API_KEY
#
# models:
#   - id: openrouter/deepseek-r1
#     provider: openrouter
#     contextWindow: 64000
